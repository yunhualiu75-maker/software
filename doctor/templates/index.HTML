<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能医生工作站 - 人脸识别病历系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f0f2f5; }
        .card-header { background-color: #2c3e50; color: white; }
        .face-capture-area { border: 2px dashed #6c757d; border-radius: 10px; padding: 15px; text-align: center; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; }
        .patient-card { background-color: #e9ecef; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .patient-photo { max-width: 150px; max-height: 150px; border-radius: 8px; margin-bottom: 10px; }
        .btn-clear { background-color: #dc3545; color: white; border: none; }
        .btn-clear:hover { background-color: #c82333; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="text-center mb-4">👨‍⚕️ 智能医生工作站 | 人脸识别确认患者</h1>

            <!-- 人脸识别区域 -->
            <div class="card mb-4">
                <div class="card-header">😀 人脸识别确认患者身份</div>
                <div class="card-body">
                    <ul class="nav nav-tabs" id="faceTab" role="tablist">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#camera" type="button">📷 摄像头拍照</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#upload" type="button">🖼️ 上传照片</button></li>
                    </ul>
                    <div class="tab-content mt-3">
                        <div class="tab-pane fade show active" id="camera">
                            <div class="face-capture-area">
                                <video id="video" autoplay playsinline></video>
                                <div class="mt-2">
                                    <button id="captureBtn" class="btn btn-success">📸 拍照识别</button>
                                    <button id="startCameraBtn" class="btn btn-secondary">开启摄像头</button>
                                </div>
                                <canvas id="canvas" style="display:none;"></canvas>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="upload">
                            <div class="face-capture-area">
                                <input type="file" id="photoInput" class="form-control" accept="image/jpeg,image/jpg,image/png,image/bmp,image/gif">
                                <button id="uploadPhotoBtn" class="btn btn-primary mt-2">识别上传照片</button>
                            </div>
                        </div>
                    </div>
                    <div id="recogResult" class="mt-3 alert alert-info" style="display:none;"></div>
                    <!-- 清空按钮 -->
                    <div class="text-end mt-2">
                        <button id="clearBtn" class="btn btn-clear">🗑️ 清空当前识别结果</button>
                    </div>
                </div>
            </div>

            <!-- 病历展示与处方（初始隐藏，识别成功后显示） -->
            <div id="medicalSection" style="display: none;">
                <div class="card">
                    <div class="card-header">📄 患者病历 & 处方</div>
                    <div class="card-body">
                        <!-- 患者照片区域 -->
                        <div id="patientPhotoArea" class="text-center mb-3"></div>
                        <div id="patientInfo" class="mb-3 patient-card"></div>
                        <ul class="nav nav-tabs" id="medicalTabs" role="tablist">
                            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#basic">基本信息</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#history">既往病历</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#reports">检查检验报告</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#medications">用药记录</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#diagnosis">诊断历史</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#prescription">开具处方</button></li>
                        </ul>
                        <div class="tab-content mt-3">
                            <div class="tab-pane fade show active" id="basic">
                                <div id="basicInfo" class="p-2 bg-light rounded">未识别患者</div>
                            </div>
                            <div class="tab-pane fade" id="history">
                                <textarea id="historyText" class="form-control" rows="8" readonly></textarea>
                            </div>
                            <div class="tab-pane fade" id="reports">
                                <textarea id="reportsText" class="form-control" rows="8" readonly></textarea>
                            </div>
                            <div class="tab-pane fade" id="medications">
                                <textarea id="medicationsText" class="form-control" rows="8" readonly></textarea>
                            </div>
                            <div class="tab-pane fade" id="diagnosis">
                                <textarea id="diagnosisText" class="form-control" rows="8" readonly></textarea>
                            </div>
                            <div class="tab-pane fade" id="prescription">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label>药品名称</label>
                                        <input type="text" id="medicineName" class="form-control mb-2" placeholder="例如：阿莫西林">
                                        <label>用法用量</label>
                                        <input type="text" id="dosage" class="form-control mb-2" placeholder="例如：每日三次，每次一粒">
                                        <label>备注</label>
                                        <textarea id="prescNote" class="form-control mb-2" rows="2" placeholder="注意事项等"></textarea>
                                        <button id="addPrescBtn" class="btn btn-secondary">➕ 添加到处方</button>
                                    </div>
                                    <div class="col-md-6">
                                        <label>当前处方清单</label>
                                        <textarea id="prescList" class="form-control" rows="6" readonly placeholder="暂无药品"></textarea>
                                        <button id="savePrescBtn" class="btn btn-success mt-2 w-100">💾 保存处方并下载</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPatient = null;
    let prescriptionItems = [];
    let videoStream = null;

    const recogResultDiv = document.getElementById('recogResult');
    const medicalSection = document.getElementById('medicalSection');
    const patientPhotoArea = document.getElementById('patientPhotoArea');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const photoInput = document.getElementById('photoInput');
    const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const basicInfoDiv = document.getElementById('basicInfo');
    const historyText = document.getElementById('historyText');
    const reportsText = document.getElementById('reportsText');
    const medicationsText = document.getElementById('medicationsText');
    const diagnosisText = document.getElementById('diagnosisText');
    const medicineName = document.getElementById('medicineName');
    const dosage = document.getElementById('dosage');
    const prescNote = document.getElementById('prescNote');
    const prescList = document.getElementById('prescList');
    const addPrescBtn = document.getElementById('addPrescBtn');
    const savePrescBtn = document.getElementById('savePrescBtn');

    // 清空所有信息
    function clearAll() {
        currentPatient = null;
        prescriptionItems = [];
        updatePrescListUI();
        medicalSection.style.display = 'none';
        recogResultDiv.style.display = 'none';
        recogResultDiv.innerHTML = '';
        patientPhotoArea.innerHTML = '';
        basicInfoDiv.innerHTML = '未识别患者';
        historyText.value = '';
        reportsText.value = '';
        medicationsText.value = '';
        diagnosisText.value = '';
        medicineName.value = '';
        dosage.value = '';
        prescNote.value = '';
        // 可选：停止摄像头流
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
            video.srcObject = null;
        }
    }

    clearBtn.addEventListener('click', clearAll);

    async function recognizeFace(imageFile) {
        const formData = new FormData();
        formData.append('face_image', imageFile);
        recogResultDiv.style.display = 'block';
        recogResultDiv.className = 'alert alert-info';
        recogResultDiv.innerText = '识别中...';
        try {
            const resp = await fetch('/recognize_face', { method: 'POST', body: formData });
            const data = await resp.json();
            if (data.success) {
                recogResultDiv.className = 'alert alert-success';
                recogResultDiv.innerHTML = `✅ 识别成功！患者：${data.patient.患者姓名} (编号: ${data.patient.患者编号})，相似度: ${(data.patient.similarity*100).toFixed(1)}%`;
                currentPatient = data.patient;
                displayPatientInfo(currentPatient);
                await displayPatientPhoto(currentPatient.患者编号);
                medicalSection.style.display = 'block';
                prescriptionItems = [];
                updatePrescListUI();
            } else {
                recogResultDiv.className = 'alert alert-warning';
                recogResultDiv.innerText = `⚠️ ${data.message || '识别失败'}`;
                medicalSection.style.display = 'none';
                currentPatient = null;
            }
        } catch(e) {
            recogResultDiv.className = 'alert alert-danger';
            recogResultDiv.innerText = `错误: ${e.message}`;
            medicalSection.style.display = 'none';
        }
    }

    async function displayPatientPhoto(patientId) {
        try {
            const resp = await fetch(`/get_patient_photo/${patientId}`);
            const data = await resp.json();
            if (data.photo_url) {
                patientPhotoArea.innerHTML = `<img src="${data.photo_url}" class="patient-photo" alt="患者照片">`;
            } else {
                patientPhotoArea.innerHTML = '<p class="text-muted">暂无患者照片</p>';
            }
        } catch(e) {
            patientPhotoArea.innerHTML = '<p class="text-muted">加载照片失败</p>';
        }
    }

    function displayPatientInfo(patient) {
        basicInfoDiv.innerHTML = `
            <p><strong>患者编号：</strong> ${patient.患者编号}</p>
            <p><strong>姓名：</strong> ${patient.患者姓名}</p>
            <p><strong>性别：</strong> ${patient.性别}</p>
            <p><strong>年龄：</strong> ${patient.年龄}</p>
            <p><strong>体重(kg)：</strong> ${patient['体重(kg)'] || ''}</p>
            <p><strong>身高(cm)：</strong> ${patient['身高(cm)'] || ''}</p>
            <p><strong>家庭信息：</strong> ${patient.家庭信息 || '无'}</p>
        `;
        historyText.value = patient.既往病历 || '无';
        reportsText.value = patient.检查检验报告 || '无';
        medicationsText.value = patient.用药记录 || '无';
        diagnosisText.value = patient.诊断历史 || '无';
    }

    // 摄像头相关
    startCameraBtn.addEventListener('click', async () => {
        if (videoStream) videoStream.getTracks().forEach(track => track.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            videoStream = stream;
        } catch(e) {
            alert('无法开启摄像头: ' + e.message);
        }
    });

    captureBtn.addEventListener('click', () => {
        if (!videoStream) {
            alert('请先点击“开启摄像头”');
            return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
            const file = new File([blob], 'camera_capture.jpg', { type: 'image/jpeg' });
            recognizeFace(file);
        }, 'image/jpeg');
    });

    uploadPhotoBtn.addEventListener('click', () => {
        const file = photoInput.files[0];
        if (!file) {
            alert('请选择照片');
            return;
        }
        recognizeFace(file);
    });

    function updatePrescListUI() {
        if (prescriptionItems.length === 0) {
            prescList.value = '暂无药品';
            return;
        }
        let text = '';
        prescriptionItems.forEach((item, idx) => {
            text += `${idx+1}. ${item.medicine} | ${item.dosage} | 备注:${item.note}\n`;
        });
        prescList.value = text;
    }

    addPrescBtn.addEventListener('click', () => {
        if (!currentPatient) {
            alert('请先通过人脸识别确认患者');
            return;
        }
        const med = medicineName.value.trim();
        const dos = dosage.value.trim();
        const note = prescNote.value.trim();
        if (!med) {
            alert('请输入药品名称');
            return;
        }
        prescriptionItems.push({ medicine: med, dosage: dos, note: note });
        updatePrescListUI();
        medicineName.value = '';
        dosage.value = '';
        prescNote.value = '';
    });

    savePrescBtn.addEventListener('click', async () => {
        if (!currentPatient) {
            alert('请先通过人脸识别确认患者');
            return;
        }
        if (prescriptionItems.length === 0) {
            alert('处方为空，请添加药品');
            return;
        }
        try {
            const resp = await fetch('/save_prescription', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    patient_id: currentPatient.患者编号,
                    patient_name: currentPatient.患者姓名,
                    items: prescriptionItems
                })
            });
            const data = await resp.json();
            if (data.success) {
                alert(`处方保存成功！\n文件名: ${data.filename}\n将自动下载`);
                window.location.href = data.download_url;
                prescriptionItems = [];
                updatePrescListUI();
            } else {
                alert('保存失败: ' + data.error);
            }
        } catch(e) {
            alert('请求失败');
        }
    });
</script>
</body>
</html>
